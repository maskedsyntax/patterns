name: Bug Report
description: Report a bug to help us improve Patterns.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ### Thanks for reporting! 🐛
        We appreciate you taking the time to help us fix issues in **Patterns**.

  - type: textarea
    id: bug-description
    attributes:
      label: Bug Description
      description: What happened?
      placeholder: Describe the issue clearly...
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: Steps to Reproduce
      description: How can we see this bug ourselves?
      placeholder: |
        1. Open Patterns
        2. Click on...
        3. See the error...
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What should have happened?
      placeholder: I expected to see...
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Platform
      description: Are you using macOS or Linux?
      placeholder: macOS / Linux
    validations:
      required: true
