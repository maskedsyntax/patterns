name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            jobs: macos-dmg
          - os: ubuntu-latest
            platform: linux
            jobs: linux-deb
          - os: windows-latest
            platform: windows
            jobs: windows-exe

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev binutils libayatana-appindicator3-dev libsystemd-dev

      - name: Install appdmg (macOS)
        if: matrix.platform == 'macos'
        run: npm install -g appdmg

      - name: Install Inno Setup (Windows)
        if: matrix.platform == 'windows'
        run: choco install innosetup --yes --no-progress

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install flutter_distributor
        run: dart pub global activate flutter_distributor

      - name: Get dependencies
        run: flutter pub get

      - name: Distribute ${{ matrix.platform }}
        shell: bash
        run: |
          export PATH="$PATH":"$HOME/.pub-cache/bin"
          flutter_distributor release --name release --jobs ${{ matrix.jobs }}

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: patterns-${{ matrix.platform }}
          path: dist/**

      - name: Upload binaries to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/**/*.dmg
            dist/**/*.deb
            dist/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
