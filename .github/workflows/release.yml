name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            jobs: macos-dmg
          - os: ubuntu-latest
            platform: linux
            jobs: linux-deb

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev binutils libayatana-appindicator3-dev libsystemd-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install flutter_distributor
        run: dart pub global activate flutter_distributor

      - name: Get dependencies
        run: flutter pub get

      - name: Distribute ${{ matrix.platform }}
        run: |
          export PATH="$PATH":"$HOME/.pub-cache/bin"
          flutter_distributor release --name release --jobs ${{ matrix.jobs }}

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/release/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
